# messaging — Kafka + MongoDB para el flujo de clasificacion de tickets (equipo ACC)
#
# Kafka respalda la Saga por coreografia entre ticket-service y ai-service:
#   ticket-service publica "ticket.created" -> ai-service clasifica -> publica
#   "ticket.classified" -> ticket-service actualiza el ticket.
#
# Uso (desde esta carpeta):
#   docker compose -f docker-compose.messaging.yml up -d
#
# Requiere que la red "soporte-net" ya exista (la crea db-cluster/docker-compose.cockroach.yml).
# Kafka expone dos listeners: uno interno para contenedores en soporte-net (kafka:29092) y uno
# para procesos corriendo directo en el host, como ticket-service/ai-service via
# mvn spring-boot:run / uvicorn (localhost:9092) -- mismo patron que el resto del proyecto,
# donde los microservicios de aplicacion no estan dockerizados, solo la infraestructura.

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - soporte-net

  mongo:
    image: mongo:7
    container_name: mongo
    hostname: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - soporte-net

networks:
  soporte-net:
    external: true

volumes:
  kafka-data: {}
  mongo-data: {}
